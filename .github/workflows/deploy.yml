name: CI/CD — Nexus Científico

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload dist
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  deploy:
    name: Deploy
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    environment:
      name: production
      url: https://nexuscientifico.com.br
    steps:
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Deploy to Cloudflare Pages
        run: npx wrangler@4 pages deploy dist --project-name=nexus-cientifico-site --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Configurar www.nexuscientifico.com.br
        run: |
          echo "=== 1. Registrar www como dominio customizado no Pages ==="
          PAGES_RESULT=$(curl -s -w "\nHTTP:%{http_code}" -X POST \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/nexus-cientifico-site/domains" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json" \
            --data '{"name":"www.nexuscientifico.com.br"}')
          PAGES_STATUS=$(echo "$PAGES_RESULT" | grep "HTTP:" | cut -d: -f2)
          echo "Pages API status: $PAGES_STATUS"
          echo "$PAGES_RESULT" | head -5

          echo ""
          echo "=== 2. Buscar Zone ID do dominio ==="
          ZONE_RESP=$(curl -s \
            "https://api.cloudflare.com/client/v4/zones?name=nexuscientifico.com.br" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN")
          ZONE_ID=$(echo "$ZONE_RESP" | python3 -c "import sys,json; data=json.load(sys.stdin); print(data['result'][0]['id'] if data.get('result') else 'NOT_FOUND')" 2>/dev/null)
          echo "Zone ID: $ZONE_ID"

          if [ "$ZONE_ID" != "NOT_FOUND" ] && [ -n "$ZONE_ID" ]; then
            echo ""
            echo "=== 3. Criar CNAME www -> nexus-cientifico-site.pages.dev ==="
            DNS_RESULT=$(curl -s -w "\nHTTP:%{http_code}" -X POST \
              "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records" \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              -H "Content-Type: application/json" \
              --data '{"type":"CNAME","name":"www","content":"nexus-cientifico-site.pages.dev","proxied":true}')
            DNS_STATUS=$(echo "$DNS_RESULT" | grep "HTTP:" | cut -d: -f2)
            echo "DNS API status: $DNS_STATUS"
            echo "$DNS_RESULT" | head -3
          else
            echo "Zone nao encontrada com este token — DNS precisara ser adicionado manualmente"
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
